<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8">
    <title>Розумний Будинок</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body class="bg-light">

    <!-- Хедер з адаптивним контейнером -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container"> <!-- Адаптивний контейнер -->
        <a class="navbar-brand" href="#">Розумний Будинок</a>

        <div class="d-flex align-items-center ms-auto">
          <!-- Перемикач мови -->
          <div class="me-3">
            <select id="languageSelect" class="form-select form-select-sm">
              <option value="uk" selected>UA</option>
              <option value="en">EN</option>
            </select>
          </div>

          <!-- Ім'я користувача -->
          <div class="me-3 text-white" id="userName">Гість</div>

          <!-- Кнопка меню (offcanvas) -->
          <button class="btn btn-outline-light" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu" aria-controls="offcanvasMenu">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
      </div>
    </nav>

    <!-- Offcanvas меню справа -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasMenu" aria-labelledby="offcanvasMenuLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasMenuLabel">Меню</h5>
        <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Закрити"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="list-group list-group-flush">
          <li class="list-group-item"><a href="#">Головна</a></li>
          <li class="list-group-item"><a href="#">Налаштування</a></li>
          <li class="list-group-item"><a href="#">Зберегти</a></li>
          <li class="list-group-item"><a href="#">Зберегти як..</a></li>
          <li class="list-group-item"><a href="#">Мої розумні будинки</a></li>
          <li class="list-group-item"><a href="#">Допомога</a></li>
        </ul>
      </div>
    </div>

    <!-- Основний контейнер контенту -->
    <div class="container py-4">
      <!-- Форма додавання пристрою -->
      <div class="card mb-4 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Додати компонент</h5>
          <div class="row g-3 align-items-end">
            <div class="col-md-4">
              <label for="deviceLocation" class="form-label">Розташування</label>
              <select id="deviceLocation" class="form-select"></select>
            </div>

            <div class="col-md-4">
              <label for="deviceType" class="form-label">Компонент</label>
              <select id="deviceType" class="form-select"></select>
            </div>

            <div class="col-md-4">
              <label for="extendedName" class="form-label">Розширена назва</label>
              <input type="text" id="extendedName" class="form-control" placeholder="Наприклад: бра біля ліжка">
            </div>

            <div class="col-12 text-end">
              <button id="addDeviceBtn" class="btn btn-primary">Додати компонент</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Список доданих компонентів -->
      <h2 class="mb-3">Компоненти</h2>

      <template id="device-card-template">
        <div class="card card-device">
          <div class="card-body">
            <h5 class="card-title"></h5>
            <p class="card-text"><em class="card-text-content"></em></p>
            <p><strong class="device-status"></strong></p>
          </div>
          
          <!-- Індивідуальні кнопки -->
          <div class="specific-buttons p-2 border-top"></div>
            
          <!-- Універсальний регулятор -->
          <div class="volume-regulator-wrapper d-none mt-2">
            <div class="d-flex align-items-center gap-1 badge__volume">
              <label class="form-label mb-0 volume-regulator-label"></label>
              <input type="range" class="form-range flex-grow-1 volume-regulator-slider" min="0" max="100">
              <span class="badge bg-secondary volume-regulator-display"></span>
            </div>
          </div>
        </div>
        <div class="mt-1"></div>
        <div class="collapse my-1 integration-collapse">
          <div class="card card-body bg-light">
            <div class="mb-2">
              <label>IP / MAC:</label>
              <input type="text" class="form-control form-control-sm integration-ip">
            </div>
            <div class="mb-2">
              <label>Протокол:</label>
              <select class="form-select form-select-sm integration-protocol">
                <option value="WebSocket">WebSocket</option>
                <option value="MQTT">MQTT</option>
                <option value="HTTP">HTTP</option>
              </select>
            </div>
            <div class="mb-2">
              <label>Device ID:</label>
              <input type="text" class="form-control form-control-sm integration-deviceId">
            </div>
            <div class="mb-2">
              <label>API Key / Token:</label>
              <input type="text" class="form-control form-control-sm integration-apiKey">
            </div>
            <button class="btn btn-success btn-sm save-integration">Зберегти</button>
          </div>
        </div>

        <div class="card-device-out__btn-group d-flex gap-1 mt-1">
          <button class="card-device-out__btn btn btn-sm btn-success flex-fill toggle-btn"
                  title = "Увімкнути/Вимкнути цей пристрій">
          </button>
          <button class="card-device-out__btn btn btn-sm btn-danger flex-fill remove-btn"
                  title = "Видалити цей пристрій з системи">
            Видалити
          </button>
          <button class="card-device-out__btn btn btn-sm btn-secondary flex-fill integration-btn" 
                  data-bs-toggle="collapse"
                  aria-expanded="false"
                  title="Інтеграція в систему через IP, MQTT, HTTP або WebSocket">
            Інтеграція
          </button>
        </div>
      </template>

      <div id="devicesContainer" class="row g-3"></div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./index.js"></script>
  </body>
</html>
