<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8">
    <title>Розумний Будинок</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles/index.css">
  </head>
  <body>

    <!-- Перевірка аутентифікації -->
    <script src="./scripts/auth.js"></script>
    <script>
      if (!Auth.isAuthenticated()) {
        window.location.href = 'login.html';
      }
    </script>

    <!-- Хедер -->
    <nav class="app-navbar">
      <div class="app-navbar__container">
        <div class="app-navbar__brand">
          <span class="app-navbar__logo">
            🏠
            <!-- PNG/JPG -->
            <!-- <img src="./assets/logo.png" alt="logo" class="app-navbar__logo" style="height: 32px;"> -->
            <!-- SVG -->
            <!-- <img src="./assets/logo.svg" alt="logo" class="app-navbar__logo" style="height: 32px;"> -->
          </span>
          <span class="app-navbar__brand-text" data-i18n="brandName">Розумний Будинок</span>
        </div>
        <div class="app-navbar__controls">
          <!-- Перемикач мови -->
          <!-- <select id="languageSelect" class="app-navbar__lang-select">
            <option value="uk" selected>UA</option>
            <option value="en">EN</option>
          </select> -->
          <div class="app-navbar__lang-dropdown" id="langDropdown">
            <button class="app-navbar__lang-btn" id="langBtn">🌐 UA</button>
            <div class="app-navbar__lang-menu d-none" id="langMenu">
              <a href="#" class="app-navbar__lang-item" data-lang="uk">🌐 UA</a>
              <a href="#" class="app-navbar__lang-item" data-lang="en">🌐 EN</a>
            </div>
          </div>

          <!-- Ім'я користувача -->
          <span class="app-navbar__user" id="userName">Гість</span>

          <!-- Кнопка меню (offcanvas) -->
          <button class="app-navbar__menu-btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu" aria-controls="offcanvasMenu">
            <!-- <span class="navbar-toggler-icon"></span> -->

          </button>
        </div>
      </div>
    </nav>

    <!-- Offcanvas меню справа -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasMenu" aria-labelledby="offcanvasMenuLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasMenuLabel" data-i18n="menuTitle">Меню</h5>
        <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Закрити"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="list-group list-group-flush">
          <li class="list-group-item"><a href="#" data-i18n="menuHome">Головна</a></li>
          <li class="list-group-item"><a href="#" data-i18n="menuSettings">Налаштування</a></li>
          <li class="list-group-item"><a href="#" data-i18n="menuSave">Зберегти</a></li>
          <li class="list-group-item"><a href="#" data-i18n="menuSaveAs">Зберегти як..</a></li>
          <li class="list-group-item"><a href="#" data-i18n="menuMyHouses">Мої розумні будинки:</a>
            <nav id="smartHomesMenu"></nav>
          </li>
          <li class="list-group-item"><a href="#" data-i18n="menuHelp" data-i18n="menuHelp">Допомога</a></li>

          <li class="list-group-item"><a href="#" id="logoutBtn" data-i18n="menuLogout">Вийти</a></li>
        </ul>
      </div>
    </div>

    <!-- Основний контейнер контенту -->
    <div class="app-container">

      <!-- Форма додавання пристрою -->
      <div class="app-panel">
        <div class="app-panel__header">
          <h5 data-i18n="addComponentTitle">Додати компонент</h5>
        </div>
        <div class="app-panel__body">
          <div class="row g-3 align-items-end">
            <div class="col-md-4">
              <label for="deviceLocation" class="app-panel__label" data-i18n="labelLocation">Розташування</label>
              <select id="deviceLocation" class="app-panel__select"></select>
            </div>

            <div class="col-md-4">
              <label for="deviceType" class="app-panel__label" data-i18n="labelComponent">Компонент</label>
              <select id="deviceType" class="app-panel__select"></select>
            </div>

            <div class="col-md-4">
              <label for="extendedName" class="app-panel__label" data-i18n="labelExtendedName">Розширена назва</label>
              <input type="text" id="extendedName" class="app-panel__input" data-i18n-placeholder="extendedNamePlaceholder" placeholder="Наприклад: бра біля ліжка">
            </div>

            <div class="col-12 text-end">
              <button id="addDeviceBtn" class="app-btn" data-i18n="addComponentBtn">Додати компонент</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Список доданих компонентів -->
      <h2 class="app-section-title" data-i18n="componentsTitle">Компоненти</h2>

      <template id="device-card-template">
        <div class="device-card">
          <div class="device-card__body">
            <h5 class="device-card__title card-title"></h5>
            <p class="device-card__location"><em class="card-text-content"></em></p>
            <p><strong class="device-status"></strong></p>
          </div>
          
          <!-- Індивідуальні кнопки -->
          <div class="specific-buttons device-card__specific p-2"></div>
            
          <!-- Універсальний регулятор -->
          <div class="volume-regulator-wrapper d-none mt-2">
            <div class="d-flex align-items-center gap-1 badge__volume">
              <label class="form-label mb-0 volume-regulator-label"></label>
              <input type="range" class="form-range flex-grow-1 volume-regulator-slider" min="0" max="100">
              <span class="badge bg-secondary volume-regulator-display"></span>
            </div>
          </div>
        </div>
        <div class="mt-1"></div>
        <div class="collapse my-1 integration-collapse">
          <div class="device-card__integration">
            <div class="mb-2">
               <label class="integration-ip-label"></label>
              <input type="text" class="app-panel__input app-panel__input--sm integration-ip">
            </div>
            <div class="mb-2">
              <label class="integration-protocol-label"></label>
              <select class="app-panel__select app-panel__select--sm integration-protocol">
                <option value="WebSocket"></option>
                <option value="MQTT"></option>
                <option value="HTTP"></option>
              </select>
            </div>
            <div class="mb-2">
              <label class="integration-deviceid-label"></label>
              <input type="text" class="app-panel__input app-panel__input--sm integration-deviceId">
            </div>
            <div class="mb-2">
              <label class="integration-apikey-label"></label>
              <input type="text" class="app-panel__input app-panel__input--sm integration-apiKey">
            </div>
            <button class="app-btn app-btn--sm app-btn--success save-integration">Зберегти</button>
          </div>
        </div>

        <div class="device-card__btn-group">
          <button class="app-btn app-btn--sm app-btn--success flex-fill toggle-btn"
                  title="Увімкнути/Вимкнути цей пристрій">
          </button>
          <button class="app-btn app-btn--sm app-btn--danger flex-fill remove-btn"
                  title="Видалити цей пристрій з системи">
          </button>
          <button class="app-btn app-btn--sm app-btn--secondary flex-fill integration-btn"
                  data-bs-toggle="collapse"
                  aria-expanded="false"
                  title="Інтеграція в систему через IP, MQTT, HTTP або WebSocket">
          </button>
        </div>
      </template>

      <div id="devicesContainer" class="row g-3"></div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./scripts/i18n.js"></script>    
    <script src="./scripts/models.js"></script>
    <script src="./scripts/smarthouse.js"></script>
    <script src="./scripts/auth.js"></script>
    <script src="./scripts/api.js"></script>
    <script src="./scripts/index.js"></script>
  </body>
</html>
